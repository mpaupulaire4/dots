clear_all_shortcuts yes

# Time to wait for the next key in a sequence (seconds)
map_timeout 2.0

# ── Persistent mode definitions ───────────────────────────────────────────────
# Resize and move need to stay active for repeated keypresses, so they use
# --new-mode. Everything else uses bare ctrl+t>key sequences.

map --new-mode resize ctrl+t>ctrl+r
map --new-mode move   ctrl+t>ctrl+m

# ── Always-active (base / "locked" equivalent) ────────────────────────────────

map ctrl+k             clear_terminal scrollback
map ctrl+shift+c       copy_to_clipboard
map ctrl+v             paste_from_clipboard
map ctrl+shift+plus    change_font_size all +1.0
map ctrl+minus         change_font_size all -1.0
map ctrl+0             change_font_size all 0
map ctrl+tab           next_tab
map ctrl+shift+tab     previous_tab

# ── ctrl+t sequences — focus ──────────────────────────────────────────────────

map ctrl+t>left        neighboring_window left
map ctrl+t>right       neighboring_window right
map ctrl+t>up          neighboring_window up
map ctrl+t>down        neighboring_window down

# ── ctrl+t sequences — windows & tabs ────────────────────────────────────────

map ctrl+t>n           launch --location=vsplit
map ctrl+t>ctrl+n      new_tab
map ctrl+t>ctrl+t      toggle_maximized
map ctrl+t>ctrl+s      show_scrollback

# ── ctrl+t sequences — overlays ───────────────────────────────────────────────

map ctrl+t>ctrl+g      launch --type=overlay --cwd current lazygit
map ctrl+t>ctrl+e      launch --type=overlay --cwd current broot

# ── ctrl+t>p sequences — pane splits ─────────────────────────────────────────

map ctrl+t>p>r         launch --location=vsplit
map ctrl+t>p>d         launch --location=hsplit

# ── ctrl+t>t sequences — tab management ──────────────────────────────────────

map ctrl+t>t>n         new_tab
map ctrl+t>t>r         set_tab_title

# ── Resize mode ───────────────────────────────────────────────────────────────

map --mode resize esc    pop_keyboard_mode
map --mode resize enter  pop_keyboard_mode
map --mode resize left   resize_window narrower
map --mode resize right  resize_window wider
map --mode resize up     resize_window taller
map --mode resize down   resize_window shorter
map --mode resize alt+left   neighboring_window left
map --mode resize alt+right  neighboring_window right
map --mode resize alt+up     neighboring_window up
map --mode resize alt+down   neighboring_window down

# ── Move mode ─────────────────────────────────────────────────────────────────

map --mode move esc       pop_keyboard_mode
map --mode move enter     pop_keyboard_mode
map --mode move left      move_window left
map --mode move right     move_window right
map --mode move up        move_window up
map --mode move down      move_window down
map --mode move tab       move_tab_forward
map --mode move shift+tab move_tab_backward
